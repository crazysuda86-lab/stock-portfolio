<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식 포트폴리오 V2</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .sub {
      color: #6b7280;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    h2 {
      margin-top: 0;
      font-size: 22px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
      vertical-align: middle;
    }
    th {
      font-size: 14px;
      color: #374151;
      background: #f9fafb;
    }
    input {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #111827;
      color: white;
    }
    button.secondary {
      background: #374151;
    }
    button.light {
      background: #e5e7eb;
      color: #111827;
    }
    button.danger {
      background: #dc2626;
    }
    .summary-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .metric {
      background: #f9fafb;
      border-radius: 12px;
      padding: 14px;
      border: 1px solid #e5e7eb;
    }
    .metric .label {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 6px;
    }
    .metric .value {
      font-size: 22px;
      font-weight: 700;
    }
    .profit-plus { color: #047857; }
    .profit-minus { color: #b91c1c; }
    .small {
      color: #6b7280;
      font-size: 13px;
    }
    .empty {
      color: #9ca3af;
      padding: 18px 0;
    }
    canvas {
      max-height: 320px;
    }
    .delete-btn {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .summary-box {
        grid-template-columns: 1fr;
      }
      table {
        font-size: 13px;
      }
      th, td {
        padding: 8px 6px;
      }
      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>주식 포트폴리오 V2</h1>
    <div class="sub">보유 종목을 입력하고 수익률과 자산 비중을 한눈에 확인하세요.</div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>종목 입력</h2>
          <div class="small">종목명, 수량, 매수가, 현재가를 입력한 뒤 계산하세요.</div>

          <table id="portfolioTable">
            <thead>
              <tr>
                <th>종목명</th>
                <th>수량</th>
                <th>매수가</th>
                <th>현재가</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>

          <div class="btn-row">
            <button onclick="addRow()">행 추가</button>
            <button class="secondary" onclick="calculatePortfolio()">계산하기</button>
            <button class="light" onclick="savePortfolio()">저장</button>
            <button class="danger" onclick="resetPortfolio()">초기화</button>
          </div>
        </div>

        <div class="card">
          <h2>종목별 요약</h2>
          <div id="detailOutput" class="small">아직 계산 전입니다.</div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>전체 결과</h2>
          <div class="summary-box">
            <div class="metric">
              <div class="label">총 매수금액</div>
              <div class="value" id="totalBuy">$0</div>
            </div>
            <div class="metric">
              <div class="label">총 평가금액</div>
              <div class="value" id="totalNow">$0</div>
            </div>
            <div class="metric">
              <div class="label">평가손익</div>
              <div class="value" id="totalProfit">$0</div>
            </div>
            <div class="metric">
              <div class="label">수익률</div>
              <div class="value" id="totalRate">0.00%</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h2>자산 비중 그래프</h2>
          <canvas id="portfolioChart"></canvas>
          <div class="small" style="margin-top:12px;">현재 평가금액 기준 비중입니다.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const defaultData = [
      { name: "VOO", qty: 10, buy: 500, now: 530 },
      { name: "QQQ", qty: 5, buy: 450, now: 470 }
    ];

    let chartInstance = null;

    function formatMoney(value) {
      return "$" + Number(value).toLocaleString(undefined, { maximumFractionDigits: 2 });
    }

    function createRow(data = { name: "", qty: 0, buy: 0, now: 0 }) {
      const tbody = document.querySelector("#portfolioTable tbody");
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><input type="text" value="${data.name}" placeholder="예: VOO"></td>
        <td><input type="number" value="${data.qty}" min="0" step="any"></td>
        <td><input type="number" value="${data.buy}" min="0" step="any"></td>
        <td><input type="number" value="${data.now}" min="0" step="any"></td>
        <td><button class="danger delete-btn" onclick="deleteRow(this)">삭제</button></td>
      `;
      tbody.appendChild(row);
    }

    function addRow() {
      createRow();
    }

    function deleteRow(button) {
      const row = button.closest("tr");
      row.remove();
      calculatePortfolio();
      savePortfolio();
    }

    function getPortfolioData() {
      const rows = document.querySelectorAll("#portfolioTable tbody tr");
      const items = [];

      rows.forEach(row => {
        const inputs = row.querySelectorAll("input");
        const item = {
          name: inputs[0].value.trim(),
          qty: Number(inputs[1].value),
          buy: Number(inputs[2].value),
          now: Number(inputs[3].value)
        };

        if (item.name || item.qty || item.buy || item.now) {
          items.push(item);
        }
      });

      return items;
    }

    function calculatePortfolio() {
      const items = getPortfolioData();

      let totalBuy = 0;
      let totalNow = 0;

      items.forEach(item => {
        totalBuy += item.qty * item.buy;
        totalNow += item.qty * item.now;
      });

      const profit = totalNow - totalBuy;
      const rate = totalBuy === 0 ? 0 : (profit / totalBuy) * 100;

      document.getElementById("totalBuy").textContent = formatMoney(totalBuy);
      document.getElementById("totalNow").textContent = formatMoney(totalNow);

      const profitEl = document.getElementById("totalProfit");
      const rateEl = document.getElementById("totalRate");

      profitEl.textContent = formatMoney(profit);
      rateEl.textContent = rate.toFixed(2) + "%";

      profitEl.className = "value " + (profit >= 0 ? "profit-plus" : "profit-minus");
      rateEl.className = "value " + (rate >= 0 ? "profit-plus" : "profit-minus");

      renderDetail(items);
      renderChart(items);
    }

    function renderDetail(items) {
      const detailOutput = document.getElementById("detailOutput");

      if (items.length === 0) {
        detailOutput.innerHTML = `<div class="empty">입력된 종목이 없습니다.</div>`;
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>종목</th>
              <th>매수금액</th>
              <th>평가금액</th>
              <th>손익</th>
              <th>수익률</th>
            </tr>
          </thead>
          <tbody>
      `;

      items.forEach(item => {
        const buyTotal = item.qty * item.buy;
        const nowTotal = item.qty * item.now;
        const profit = nowTotal - buyTotal;
        const rate = buyTotal === 0 ? 0 : (profit / buyTotal) * 100;

        html += `
          <tr>
            <td>${item.name || "-"}</td>
            <td>${formatMoney(buyTotal)}</td>
            <td>${formatMoney(nowTotal)}</td>
            <td class="${profit >= 0 ? "profit-plus" : "profit-minus"}">${formatMoney(profit)}</td>
            <td class="${rate >= 0 ? "profit-plus" : "profit-minus"}">${rate.toFixed(2)}%</td>
          </tr>
        `;
      });

      html += `</tbody></table>`;
      detailOutput.innerHTML = html;
    }

    function renderChart(items) {
      const ctx = document.getElementById("portfolioChart");

      const filtered = items.filter(item => item.name && item.qty > 0 && item.now > 0);
      const labels = filtered.map(item => item.name);
      const data = filtered.map(item => item.qty * item.now);

      if (chartInstance) {
        chartInstance.destroy();
      }

      if (data.length === 0) {
        chartInstance = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["데이터 없음"],
            datasets: [{
              data: [1]
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: "bottom" }
            }
          }
        });
        return;
      }

      chartInstance = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels,
          datasets: [{
            data
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: "bottom"
            }
          }
        }
      });
    }

    function savePortfolio() {
      const items = getPortfolioData();
      localStorage.setItem("stockPortfolioV2", JSON.stringify(items));
      alert("포트폴리오가 저장되었습니다.");
    }

    function loadPortfolio() {
      const saved = localStorage.getItem("stockPortfolioV2");
      const tbody = document.querySelector("#portfolioTable tbody");
      tbody.innerHTML = "";

      if (saved) {
        const items = JSON.parse(saved);
        if (items.length > 0) {
          items.forEach(item => createRow(item));
        } else {
          defaultData.forEach(item => createRow(item));
        }
      } else {
        defaultData.forEach(item => createRow(item));
      }

      calculatePortfolio();
    }

    function resetPortfolio() {
      const ok = confirm("모든 입력값과 저장 데이터를 초기화할까요?");
      if (!ok) return;

      localStorage.removeItem("stockPortfolioV2");
      const tbody = document.querySelector("#portfolioTable tbody");
      tbody.innerHTML = "";
      defaultData.forEach(item => createRow(item));
      calculatePortfolio();
    }

    loadPortfolio();
  </script>
</body>
</html>
