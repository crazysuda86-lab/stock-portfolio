<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

input,select{
padding:8px;

}

button{

<body>

<h1>투자 포트폴리오 V15</h1>

<div class="card">

<h2>종목 입력</h2>

<input id="symbol" placeholder="종목코드">

<input id="qty" type="number" placeholder="수량">

<input id="price" type="number" placeholder="현재가">

<input id="buy" type="number" placeholder="총 매수금액">

<button onclick="addStock()">추가</button>

</div>

<div class="card">

<h2>보유 종목</h2>

<table>

<thead>

<tr>
<th>종목</th>
<th>수량</th>
<th>현재가</th>
<th>평가금</th>
<th>손익</th>
<th>관리</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

let stocks=[]
  function addStock(){

const symbol=document.getElementById("symbol").value
const qty=parseFloat(document.getElementById("qty").value)
const price=parseFloat(document.getElementById("price").value)
const buy=parseFloat(document.getElementById("buy").value)

stocks.push({symbol,qty,price,buy})

render()

}

function render(){

const body=document.getElementById("tableBody")

body.innerHTML=""

stocks.forEach((s,i)=>{

const value=s.qty*s.price
const profit=value-s.buy

body.innerHTML+=`

<tr>

<td>${s.symbol}</td>
<td>${s.qty}</td>
<td>${s.price}</td>
<td>${value.toFixed(0)}</td>
<td>${profit.toFixed(0)}</td>

<td>
<button onclick="removeStock(${i})">삭제</button>
</td>

</tr>

`

})

}

function removeStock(i){

stocks.splice(i,1)

render()

}
