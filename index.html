<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>주식 포트폴리오 V6</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyCDKxdfnyiG_6TToQXIP70x4os4Ky_70Tg",
 authDomain: "stock-portfolio-e2d97.firebaseapp.com",
 projectId: "stock-portfolio-e2d97",
 storageBucket: "stock-portfolio-e2d97.firebasestorage.app",
 messagingSenderId: "82473036597",
 appId: "1:82473036597:web:98413d32ce2c3bc7d2fa7c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function savePortfolio(data){
 await setDoc(doc(db,"portfolio","main"),{
   items:data,
   updated:new Date().toISOString()
 });
 alert("클라우드 저장 완료");
}

async function loadPortfolio(){
 const docRef = doc(db,"portfolio","main");
 const docSnap = await getDoc(docRef);

 if(docSnap.exists()){
   console.log(docSnap.data());
 }
}

window.savePortfolio = savePortfolio;
window.loadPortfolio = loadPortfolio;

</script>

</head>

<body>

<h2>주식 포트폴리오 V6 (클라우드)</h2>

<button onclick="savePortfolio([{ticker:'VOO',qty:10}])">
저장
</button>

<button onclick="loadPortfolio()">
불러오기
</button>

</body>
</html>
